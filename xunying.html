<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5, viewport-fit=cover">
    <title>忘川风华录 · 寻英模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1e1a2f 0%, #2d2338 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Serif SC', '华文楷体', '楷体', 'KaiTi', '仿宋', 'FangSong', '宋体', 'SimSun', serif;
            padding: 0.5rem;
            margin: 0;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 30% 40%, rgba(230, 200, 140, 0.06) 0%, transparent 30%),
            radial-gradient(circle at 70% 70%, rgba(180, 140, 200, 0.08) 0%, transparent 40%);
            pointer-events: none;
        }
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 1rem;
        }
        .start-title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            color: #f7e5c2;
            text-shadow: 0 0 30px #b78c4c, 0 6px 12px #00000070;
            letter-spacing: 6px;
            text-align: center;
            filter: drop-shadow(0 8px 12px black);
            line-height: 1.3;
        }
        .start-btn {
            background: radial-gradient(circle at 30% 30%, #f3da9b, #c28b3a);
            border: 2px solid #ffe3a3;
            color: #1d1427;
            font-weight: bold;
            font-size: clamp(1.4rem, 5vw, 2rem);
            padding: 1rem 3rem;
            border-radius: 4rem;
            box-shadow: 0 6px 0 #6f4f2c, 0 12px 25px black;
            cursor: pointer;
            transition: 0.1s linear;
            letter-spacing: 4px;
        }
        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #4e3a1f, 0 8px 16px black;
        }
        .bgm-toggle {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 999;
            background: rgba(20, 15, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid #b59050;
            color: #f5d78c;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 0.6rem 1.2rem;
            border-radius: 2.5rem;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .bgm-toggle:hover {
            background: rgba(40, 30, 50, 0.9);
            border-color: #f3cd81;
            color: #ffefc8;
            box-shadow: 0 0 20px #e5b55e;
        }
        .bgm-toggle.playing {
            border-color: #f3cd81;
            color: #ffefc8;
            box-shadow: 0 0 15px #e5b55e;
        }
        .main-container {
            width: 100%;
            max-width: 1000px;
            background: rgba(20, 15, 30, 0.7);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(210, 180, 120, 0.35);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 0 40px rgba(180, 140, 80, 0.2);
            border-radius: 2rem 1rem 2rem 1rem;
            padding: 1.2rem 1rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: all 0.3s;
            position: relative;
            margin: 0 auto;
        }
        .main-title {
            text-align: center;
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 600;
            color: #f7e5c2;
            text-shadow: 0 0 20px #b78c4c, 0 4px 8px #00000050;
            letter-spacing: 3px;
        }
        .content-row {
            display: flex;
            gap: 0.8rem;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .left-buttons {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 0.5rem;
            width: 100%;
            justify-content: center;
        }
        @media (min-width: 768px) {
            .left-buttons {
                flex-direction: column;
                min-width: 120px;
                flex: 0 0 120px;
                width: auto;
                justify-content: flex-start;
            }
        }
        .pool-btn {
            background: #2d2438;
            border: 2px solid #6d5e4b;
            color: #e5cfaa;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 0.6rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6), inset 0 1px 3px rgba(255, 215, 140, 0.4);
            transition: all 0.25s ease;
            text-align: center;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #3b2f40 0%, #201a28 100%);
            backdrop-filter: blur(4px);
            white-space: nowrap;
            flex: 1 1 auto;
            min-width: 70px;
        }
        @media (min-width: 768px) {
            .pool-btn {
                font-size: 1rem;
                padding: 0.9rem 0.5rem;
                border-radius: 2.5rem 0.5rem 2.5rem 0.5rem;
                flex: none;
                min-width: auto;
            }
        }
        .pool-btn.active {
            background: linear-gradient(180deg, #7b5e3b 0%, #4a3822 100%);
            border-color: #f3cd81;
            color: #ffefc8;
            box-shadow: 0 0 20px #e5b55e, inset 0 0 8px #ffd78a;
            transform: scale(1.03);
        }
        .pool-btn:hover {
            border-color: #c9aa6b;
            color: #ffe8bc;
        }
        .pool-display {
            flex: 1;
            background: rgba(14, 10, 22, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 2rem 0.8rem 2rem 0.8rem;
            border: 1px solid #b8a17a;
            padding: 1.2rem 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 280px;
            width: 100%;
            box-shadow: inset 0 0 35px #00000050, 0 12px 25px black;
            color: #f0ddc0;
            position: relative;
        }
        @media (min-width: 768px) {
            .pool-display {
                padding: 1.8rem 1.5rem;
                min-height: 320px;
            }
        }
        .pool-title-text {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            font-weight: bold;
            color: #ffd966;
            margin-bottom: 0.4rem;
            background: #30233980;
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            text-shadow: 0 0 10px #b78c4c;
            text-align: center;
            word-break: break-word;
        }
        .up-text {
            font-size: clamp(0.85rem, 3vw, 1.1rem);
            color: #ffd966;
            margin: 0.3rem 0;
            text-shadow: 0 0 8px #b78c4c;
            text-align: center;
        }
        .pity-text {
            font-size: clamp(0.8rem, 2.8vw, 1rem);
            color: #c9aa7a;
            margin: 0.2rem 0;
            text-align: center;
        }
        .total-draws-text {
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            color: #a090b0;
            margin: 0.2rem 0;
            text-align: center;
        }
        .probability-hint {
            color: #ffbb5e;
            font-weight: bold;
            font-size: clamp(0.85rem, 3vw, 1.1rem);
            margin-top: 0.3rem;
            background: #3a2e44;
            padding: 0.3rem 1.2rem;
            border-radius: 2rem;
            text-align: center;
        }
        .pool-header-btns {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.3rem;
            z-index: 5;
            flex-wrap: wrap;
        }
        .header-btn {
            background: #4a3340;
            border: 1px solid #b87c6a;
            color: #f5c6b0;
            font-size: 0.7rem;
            padding: 0.4rem 0.8rem;
            border-radius: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        @media (min-width: 768px) {
            .header-btn {
                font-size: 0.9rem;
                padding: 0.5rem 1.2rem;
            }
        }
        .header-btn:hover {
            background: #6b4450;
            color: #ffdbcc;
        }
        .up-set-area {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            align-items: center;
            margin: 0.8rem 0;
            padding: 0.8rem;
            background: rgba(30, 20, 40, 0.6);
            border-radius: 1.5rem;
            border: 1px dashed #b8a17a;
            width: 100%;
            max-width: 300px;
        }
        .searchable-select {
            position: relative;
            width: 100%;
            max-width: 220px;
        }
        .searchable-select input {
            width: 100%;
            background: #1f1729;
            border: 1px solid #b59050;
            color: #f5d78c;
            padding: 0.5rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }
        .searchable-select .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            max-height: 180px;
            overflow-y: auto;
            background: #1f1729;
            border: 1px solid #b59050;
            border-radius: 1rem;
            z-index: 20;
            display: none;
        }
        .searchable-select .dropdown.open {
            display: block;
        }
        .searchable-select .dropdown-item {
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            color: #f5d78c;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .searchable-select .dropdown-item:hover {
            background: #3b2f40;
        }
        .up-set-btn {
            background: #b6964a;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            color: #1d1427;
            font-size: 0.9rem;
        }
        .spirit-up-area {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            align-items: center;
            margin: 0.8rem 0;
            width: 100%;
            max-width: 300px;
        }
        .normal-draw-count {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.85rem;
        }
        .normal-draw-count input {
            width: 50px;
            background: #1f1729;
            border: 1px solid #b59050;
            color: #f5d78c;
            padding: 0.3rem;
            border-radius: 1rem;
            text-align: center;
            font-size: 0.9rem;
            outline: none;
        }
        .right-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.3rem;
            align-items: center;
            flex-wrap: wrap;
        }
        @media (min-width: 768px) {
            .right-actions {
                justify-content: flex-end;
            }
        }
        .draw-btn {
            background: radial-gradient(circle at 30% 30%, #f3da9b, #c28b3a);
            border: 1px solid #ffe3a3;
            color: #1d1427;
            font-weight: bold;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            box-shadow: 0 4px 0 #6f4f2c, 0 8px 16px black;
            cursor: pointer;
            transition: 0.1s linear;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .draw-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #4e3a1f, 0 4px 10px black;
        }
        .toast-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #35273e;
            border: 1px solid #cfaa6a;
            color: #ffecce;
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 999;
            box-shadow: 0 10px 25px black;
            backdrop-filter: blur(10px);
            max-width: 90vw;
            text-align: center;
        }
        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1200;
            padding: 1rem;
        }
        .confirm-box {
            background: #2f243b;
            border: 2px solid #c7a466;
            padding: 1.5rem;
            border-radius: 2rem 1rem;
            color: #f7e3b2;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            min-width: 260px;
            max-width: 90vw;
            font-size: 0.95rem;
        }
        .confirm-btns {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .confirm-btn {
            background: #b6964a;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            color: #1d1427;
            font-size: 0.9rem;
        }
        .result-display {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            justify-content: center;
            margin-top: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
        }
        @media (min-width: 768px) {
            .result-display {
                max-height: 250px;
            }
        }
        .result-item {
            background: #2f2440;
            padding: 0.2rem 0.7rem;
            border-radius: 16px;
            font-weight: bold;
            border: 1px solid #ab8f60;
            cursor: default;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        @media (min-width: 768px) {
            .result-item {
                padding: 0.3rem 1rem;
                font-size: 1rem;
            }
        }
        .result-item.jue {
            color: #ff3333;
            border-color: #ff3333;
            cursor: pointer;
        }
        .result-item.ji {
            color: #ff9933;
            border-color: #ff9933;
        }
        .result-item.zhen {
            color: #b793e6;
            border-color: #b77fe0;
        }
        .result-item.jia {
            color: #a0b5c0;
        }
        .result-item.tian-hidden {
            color: #ffbb33;
            border-color: #e5a020;
            cursor: pointer;
        }
        .result-item.di-hidden {
            color: #b793e6;
            border-color: #b77fe0;
            cursor: pointer;
        }
        .result-item.tian {
            color: #ffbb33;
            border-color: #e5a020;
        }
        .result-item.di {
            color: #b793e6;
            border-color: #b77fe0;
        }
        .result-item.xuan {
            color: #a0b5c0;
        }
        .result-item.huang {
            color: #888888;
        }
        .achievement-line {
            width: 100%;
            text-align: center;
            color: #ffbb33;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 0.4rem;
            text-shadow: 0 0 8px #e5a020;
        }
        .cat-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100;
            padding: 1rem;
        }
        .cat-box {
            background: #1e1629;
            border: 3px solid #cfaa6a;
            border-radius: 2rem 1rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            color: #f0ddc0;
            box-shadow: 0 0 40px black;
        }
        .cat-name-display {
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: bold;
            color: #ffd966;
        }
        .cat-text {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            text-align: center;
            min-height: 2.5rem;
        }
        .card-results {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            justify-content: center;
            max-height: 180px;
            overflow-y: auto;
        }
        .card-item {
            background: #2f2440;
            padding: 0.2rem 0.7rem;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            border: 1px solid #ab8f60;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        @media (min-width: 768px) {
            .card-item {
                padding: 0.3rem 1rem;
                font-size: 1rem;
            }
        }
        .card-item.revealed {
            cursor: default;
        }
        .tian-card {
            color: #ffbb33;
            border-color: #e5a020;
        }
        .di-card {
            color: #b793e6;
            border-color: #b77fe0;
        }
        .xuan-card {
            color: #a0b5c0;
        }
        .huang-card {
            color: #888888;
        }
        .cat-actions {
            display: flex;
            width: 100%;
            justify-content: space-between;
            margin-top: 0.3rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .cat-btn {
            background: #3b2f40;
            border: 1px solid #b59050;
            color: #f5d78c;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .exclusive-info {
            color: #ffbb33;
            font-size: 0.75rem;
            margin-top: 0.2rem;
        }
        .record-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100;
            padding: 1rem;
        }
        .record-box {
            background: #1e1629;
            border: 3px solid #cfaa6a;
            border-radius: 2rem 1rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 450px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            color: #f0ddc0;
            box-shadow: 0 0 40px black;
        }
        .record-list {
            overflow-y: auto;
            max-height: 45vh;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .record-row {
            display: flex;
            justify-content: space-between;
            padding: 0.2rem 0.6rem;
            background: #2f2440;
            border-radius: 1rem;
            font-size: 0.8rem;
            gap: 0.5rem;
        }
        .achievement-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100;
            padding: 1rem;
        }
        .achievement-box {
            background: #1e1629;
            border: 3px solid #cfaa6a;
            border-radius: 2rem 1rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 500px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            color: #f0ddc0;
            box-shadow: 0 0 40px black;
        }
        .achievement-item {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0.8rem;
            background: #2f2440;
            border-radius: 1rem;
            font-size: 0.9rem;
            gap: 0.5rem;
            align-items: center;
        }
        .achievement-item .name {
            flex: 1;
        }
        .achievement-item .progress {
            color: #c9aa7a;
            font-size: 0.8rem;
        }
        .achievement-item.earned {
            border: 1px solid #ffbb33;
            color: #ffd966;
        }
        .achievement-item.earned .progress {
            color: #ffbb33;
        }
    </style>
</head>
<body>

<div id="startScreen" class="start-screen">
    <div class="start-title">忘川风华录<br>寻英模拟器</div>
    <button class="start-btn" id="enterBtn">寻 英</button>
</div>

<div id="mainApp" class="main-container" style="display: none;">
    <div class="main-title">忘川风华录·寻英</div>
    <div class="content-row">
        <div class="left-buttons" id="leftButtons">
            <button class="pool-btn active" data-pool="custom" id="btnCustom">天品自选</button>
            <button class="pool-btn" data-pool="diCustom" id="btnDiCustom">地品自选</button>
            <button class="pool-btn" data-pool="advanced" id="btnAdvanced">高级卡池</button>
            <button class="pool-btn" data-pool="normal" id="btnNormal">普通卡池</button>
            <button class="pool-btn" data-pool="spirit" id="btnSpirit">引灵</button>
            <button class="pool-btn" data-pool="achievement" id="btnAchievement" style="background:#3b2f40;border-color:#b87c6a;">成就</button>
        </div>

        <div class="pool-display" id="poolDisplay">
            <div class="pool-header-btns">
                <button class="header-btn" id="endPoolBtn" style="display: none;">结束卡池</button>
                <button class="header-btn" id="recordBtn">记录</button>
            </div>
            <div class="pool-title-text" id="poolTitle">天品自选</div>

            <div id="tianUpSetArea" class="up-set-area" style="display: none;">
                <div style="color:#ffd966;font-size:0.9rem;">设定UP名士</div>
                <div class="searchable-select" id="tianSelectWrapper">
                    <input type="text" id="tianSearchInput" placeholder="搜索天卡名士..." autocomplete="off">
                    <div class="dropdown" id="tianDropdown"></div>

        const tianDropdown = document.getElementById('tianDropdown');
        const tianDiSearchInput = document.getElementById('tianDiSearchInput');
        const tianDiDropdown = document.getElementById('tianDiDropdown');
        const diUpSearchInput = document.getElementById('diUpSearchInput');
        const diUpDropdown = document.getElementById('diUpDropdown');
        const spiritNameSearchInput = document.getElementById('spiritNameSearchInput');
        const spiritNameDropdown = document.getElementById('spiritNameDropdown');
        const spiritItemSearchInput = document.getElementById('spiritItemSearchInput');
        const spiritItemDropdown = document.getElementById('spiritItemDropdown');

        let pendingHuaMulanConfirm = null;

        function random() {
            const arr = new Uint32Array(1);
            crypto.getRandomValues(arr);
            return arr[0] / 4294967296;
        }

        function setupSearchable(input, dropdown, getOptions, onSelect) {
            input.addEventListener('focus', () => {
                const options = getOptions();
                filterDropdown(input, dropdown, options);
                dropdown.classList.add('open');
            });
            input.addEventListener('input', () => {
                const options = getOptions();
                filterDropdown(input, dropdown, options);
                dropdown.classList.add('open');
            });
            input.addEventListener('blur', () => { setTimeout(() => dropdown.classList.remove('open'), 150); });
            dropdown.addEventListener('mousedown', (e) => {
                const item = e.target.closest('.dropdown-item');
                if (item) {
                    input.value = item.textContent;
                    dropdown.classList.remove('open');
                    if (onSelect) onSelect(item.textContent);
                    playClickSound();
                }
            });
        }

        function filterDropdown(input, dropdown, options) {
            const val = input.value.toLowerCase();
            dropdown.innerHTML = options.filter(o => o.toLowerCase().includes(val)).map(o => '<div class="dropdown-item">' + o + '</div>').join('');
        }

        const tianUpOptions = tianCards.filter(n => n !== '花木兰');
        const diUpOptions = [...diCards];

        setupSearchable(tianSearchInput, tianDropdown, () => tianUpOptions, (val) => { state.tianUp.tian = val; });
        setupSearchable(tianDiSearchInput, tianDiDropdown, () => diUpOptions, (val) => { state.tianUp.di = val; });
        setupSearchable(diUpSearchInput, diUpDropdown, () => diUpOptions, (val) => { state.diUp.name = val; });
        setupSearchable(spiritNameSearchInput, spiritNameDropdown, () => allNames, (val) => {
            state.spiritUp.name = val;
            state.spiritUp.group = groupA.has(val) ? 'A' : 'B';
            spiritItemSearchInput.value = '';
            state.spiritUp.item = '';
        });
        setupSearchable(spiritItemSearchInput, spiritItemDropdown, () => [...jueA, ...jueB], (val) => { state.spiritUp.item = val; });

        function showToast(text) {
            const old = document.querySelector('.toast-message');
            if (old) old.remove();
            const t = document.createElement('div');
            t.className = 'toast-message';
            t.textContent = text;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        function getPity() {
            if (state.currentPool === 'custom') return state.tianPity;
            if (state.currentPool === 'diCustom') return state.diCustomPity;
            if (state.currentPool === 'advanced') return state.advancedPity;
            if (state.currentPool === 'normal') return state.normalPity;
            if (state.currentPool === 'spirit') return state.spiritPity;
            return null;
        }

        function getTianProbability(pity) {
            const c = pity.counter;
            if (c < 50) return 0.02;
            if (c < 60) return 0.02 + (c - 49) * 0.02;
            if (c < 70) return 0.22 + (c - 59) * 0.03;
            if (c < 80) return 0.37 + (c - 69) * 0.05;
            return 1.0;
        }

        function addRecord(pool, result) {
            state.records[pool].unshift(result);
            if (state.records[pool].length > 80) state.records[pool].pop();
        }

        function updatePoolButtons() {
            btnCustom.textContent = '天品自选';
            btnDiCustom.textContent = '地品自选';
            if (state.tianUpHasBeenSet) btnCustom.textContent = state.tianUp.poolName;
            if (state.diUpHasBeenSet) btnDiCustom.textContent = state.diUp.poolName;
        }

        function checkAchievements(results, isTenDraw) {
            const triggered = [];
            if (isTenDraw && results.length === 10) {
                const diCount = results.filter(c => c.rarity === 'di').length;
                const tianCount = results.filter(c => c.rarity === 'tian').length;
                for (const ach of achievementsDi) {
                    if (diCount >= ach.min && !state.earnedA[ach.id]) {
                        state.earnedA[ach.id] = true;
                        triggered.push(ach.name);
                        break;
                    }
                }
                for (const ach of achievementsTian) {
                    if (tianCount >= ach.min && !state.earnedA[ach.id]) {
                        state.earnedA[ach.id] = true;
                        triggered.push(ach.name);
                        break;
                    }
                }
            }
            if (!state.earnedA[achievementA9.id] && state.noTianStreak >= 60) {
                state.earnedA[achievementA9.id] = true;
                triggered.push(achievementA9.name);
            }
            if (state.noTianStreak >= 60) {
                state.noTianStreakCount++;
                state.noTianStreak = 0;
                for (const ach of achievementsB) {
                    if (state.noTianStreakCount >= ach.target && state.earnedB[ach.id] < ach.target) {
                        state.earnedB[ach.id] = ach.target;
                        triggered.push(ach.name);
                    }
                }
            }
            return triggered;
        }

        function updateNoTianStreak(hasTian) {
            if (hasTian) {
                if (state.noTianStreak >= 60) state.noTianStreakCount++;
                state.noTianStreak = 0;
            } else {
                state.noTianStreak++;
            }
            for (const ach of achievementsB) {
                if (state.noTianStreakCount >= ach.target && state.earnedB[ach.id] < ach.target) {
                    state.earnedB[ach.id] = ach.target;
                }
            }
        }

        function refreshUI() {
            poolButtons.forEach(b => b.classList.toggle('active', b.dataset.pool === state.currentPool));

            if (state.currentPool === 'custom') {
                poolTitle.textContent = state.tianUp.poolName;
            } else if (state.currentPool === 'diCustom') {
                poolTitle.textContent = state.diUp.poolName;
            } else if (state.currentPool === 'achievement') {
                poolTitle.textContent = '成就';
            } else {
                const names = { advanced: '高级卡池', normal: '普通卡池', spirit: '引灵' };
                poolTitle.textContent = names[state.currentPool] || '';
            }

            updatePoolButtons();

            const isAchievement = state.currentPool === 'achievement';
            const isTian = state.currentPool === 'custom';
            const isDi = state.currentPool === 'diCustom';
            endPoolBtn.style.display = (isTian || isDi) ? 'inline-block' : 'none';
            recordBtn.style.display = isAchievement ? 'none' : 'inline-block';
            tianUpSetArea.style.display = (isTian && !state.tianUpHasBeenSet) ? 'flex' : 'none';
            diUpSetArea.style.display = (isDi && !state.diUpHasBeenSet) ? 'flex' : 'none';
            spiritUpArea.style.display = state.currentPool === 'spirit' ? 'flex' : 'none';
            normalDrawCountArea.style.display = state.currentPool === 'normal' ? 'flex' : 'none';
            directResultArea.style.display = (state.currentPool === 'normal' || state.currentPool === 'spirit') ? 'flex' : 'none';
            achievementNotification.style.display = 'none';
            if (state.currentPool === 'achievement') {
                directResultArea.style.display = 'flex';
                renderAchievementPanel();
            }

            if (!isAchievement && state.currentPool !== 'spirit') {
                const draws = state.totalDraws[state.currentPool] || 0;
                totalDrawsText.textContent = '已抽' + draws + '抽';
                totalDrawsText.style.display = 'block';
            } else if (state.currentPool === 'spirit') {
                const draws = state.totalDraws['spirit'] || 0;
                totalDrawsText.textContent = '已抽' + draws + '抽';
                totalDrawsText.style.display = 'block';
            } else {
                totalDrawsText.style.display = 'none';
            }

            upLine1.style.display = 'none';
            upLine2.style.display = 'none';
            diUpPityLine.style.display = 'none';

            if (isTian && state.tianUpHasBeenSet) {
                const a = 3 - state.tianPity.tianCount;
                upLine1.textContent = '天品名士' + state.tianUp.tian + '、地品名士' + state.tianUp.di + '出现概率提升！';
                upLine2.textContent = '此卡池再抽' + a + '张天卡必得天品名士' + state.tianUp.tian + '！';
                upLine1.style.display = 'block';
                upLine2.style.display = 'block';
            }
            if (isDi && state.diUpHasBeenSet) {
                upLine1.textContent = '地品名士' + state.diUp.name + '出现概率提升！';
                upLine1.style.display = 'block';
                const diRemain = 30 - state.diCustomPity.diUpCount;
                diUpPityLine.textContent = '再抽' + diRemain + '抽必得地卡' + state.diUp.name;
                diUpPityLine.style.display = 'block';
            }

            tianPityText.style.display = 'none';
            diPityText.style.display = 'none';
            spiritPityText.style.display = 'none';
            probabilityBoostDiv.style.display = 'none';

            if (!isAchievement) {
                const pity = getPity();
                if (state.currentPool === 'custom' || state.currentPool === 'diCustom' || state.currentPool === 'advanced') {
                    const diRemain = 10 - (pity ? pity.forDi : 0);
                    diPityText.textContent = '再抽' + diRemain + '次必得地品以上名士';
                    diPityText.style.display = 'block';
                    if (pity && pity.counter >= 51) {
                        const tianRemain = 80 - pity.counter;
                        tianPityText.textContent = '再抽' + tianRemain + '次必得天品名士';
                        tianPityText.style.display = 'block';
                        probabilityBoostDiv.style.display = 'block';
                    }
                } else if (state.currentPool === 'normal') {
                    diPityText.textContent = '再抽' + (10 - state.normalPity.forXuan) + '次必得玄卡以上名士';
                    diPityText.style.display = 'block';
                } else if (state.currentPool === 'spirit') {
                    spiritPityText.textContent = '再抽' + (40 - state.spiritPity.counter) + '次必得绝品九世灵';
                    spiritPityText.style.display = 'block';
                }
            }

            if (state.currentPool === 'spirit') {
                singleDrawBtn.textContent = '一次';
                tenDrawBtn.textContent = '十次';
                singleDrawBtn.style.display = 'inline-block';
                tenDrawBtn.style.display = 'inline-block';
            } else if (state.currentPool === 'normal') {
                singleDrawBtn.style.display = 'none';
                tenDrawBtn.textContent = '寻英';
                tenDrawBtn.style.display = 'inline-block';
            } else if (isAchievement) {
                singleDrawBtn.style.display = 'none';
                tenDrawBtn.style.display = 'none';
            } else {
                singleDrawBtn.textContent = '单次寻英';
                tenDrawBtn.textContent = '十连寻英';
                singleDrawBtn.style.display = 'inline-block';
                tenDrawBtn.style.display = 'inline-block';
            }
        }

        function renderAchievementPanel() {
            const allAch = [
                ...achievementsDi.map(a => ({ ...a, type: 'di' })),
                ...achievementsTian.map(a => ({ ...a, type: 'tian' })),
                { ...achievementA9, type: 'a9' },
                { ...achievementHua, type: 'a10' },
                ...achievementsB.map(b => ({ ...b, type: 'b' }))
            ];
            achievementListAll.innerHTML = allAch.map(a => {
                if (a.type === 'b') {
                    const count = state.earnedB[a.id] || 0;
                    const earned = count >= a.target;
                    return '<div class="achievement-item' + (earned ? ' earned' : '') + '"><span class="name">' + a.name + '</span><span class="progress">' + count + '/' + a.target + '</span></div>';
                } else {
                    const earned = state.earnedA[a.id];
                    return '<div class="achievement-item' + (earned ? ' earned' : '') + '"><span class="name">' + a.name + '</span><span class="progress">' + (earned ? '已获得' : '未获得') + '</span></div>';
                }
            }).join('');
        }

        function pickRandom(arr) {
            return arr[Math.floor(random() * arr.length)];
        }

        function drawCustomOrAdvanced() {
            const pity = getPity();
            if (pity.forDi >= 9) {
                pity.forDi = 0;
                pity.counter++;
                return generateDiCard();
            }
            const tianProb = getTianProbability(pity);
            const r = random();
            if (r < tianProb) {
                pity.counter = 0;
                pity.forDi++;
                return generateTianCard();
            } else if (r < tianProb + 0.15) {
                pity.counter++;
                pity.forDi = 0;
                return generateDiCard();
            } else {
                pity.counter++;
                pity.forDi++;
                const name = pickRandom(xuanCards);
                return { rarity: 'xuan', name: name, displayName: name };
            }
        }

        function drawDiCustom() {
            const pity = state.diCustomPity;
            pity.diUpCount++;
            if (pity.diUpCount >= 30) {
                pity.diUpCount = 0;
                pity.counter++;
                if (pity.forDi >= 9) { pity.forDi = 0; } else { pity.forDi++; }
                return { rarity: 'di', name: state.diUp.name, displayName: '???' };
            }
            if (pity.forDi >= 9) {
                pity.forDi = 0;
                pity.counter++;
                const card = generateDiCard();
                if (card.name === state.diUp.name) { pity.diUpCount = 0; }
                return card;
            }
            const tianProb = getTianProbability(pity);
            const r = random();
            if (r < tianProb) {
                pity.counter = 0;
                pity.forDi++;
                return generateTianCard();
            } else if (r < tianProb + 0.15) {
                pity.counter++;
                pity.forDi = 0;
                const card = generateDiCard();
                if (card.name === state.diUp.name) { pity.diUpCount = 0; }
                return card;
            } else {
                pity.counter++;
                pity.forDi++;
                const name = pickRandom(xuanCards);
                return { rarity: 'xuan', name: name, displayName: name };
            }
        }

        function drawNormal() {
            const pity = state.normalPity;
            if (pity.forXuan >= 9) {
                pity.forXuan = 0;
                if (random() < 0.02 / 0.22) {
                    const name = pickRandom(diCards);
                    return { rarity: 'di', name: name, displayName: '???' };
                } else {
                    const name = pickRandom(xuanCards);
                    return { rarity: 'xuan', name: name, displayName: name };
                }
            }
            const r = random();
            if (r < 0.02) {
                pity.forXuan = 0;
                const name = pickRandom(diCards);
                return { rarity: 'di', name: name, displayName: '???' };
            } else if (r < 0.22) {
                pity.forXuan = 0;
                const name = pickRandom(xuanCards);
                return { rarity: 'xuan', name: name, displayName: name };
            } else {
                pity.forXuan++;
                const name = pickRandom(huangCards);
                return { rarity: 'huang', name: name, displayName: name };
            }
        }

        function drawSpirit() {
            const pity = state.spiritPity;
            if (pity.counter >= 39) {
                pity.counter = 0;
                return generateJueSpirit();
            }
            const r = random();
            if (r < 0.05) {
                pity.counter = 0;
                return generateJueSpirit();
            } else if (r < 0.35) {
                pity.counter++;
                const name = pickRandom(getJiSpirits());
                return { rarity: 'ji', name: name, displayName: name };
            } else if (r < 0.65) {
                pity.counter++;
                const name = pickRandom(getZhenSpirits());
                return { rarity: 'zhen', name: name, displayName: name };
            } else {
                pity.counter++;
                const name = pickRandom(getJiaSpirits());
                return { rarity: 'jia', name: name, displayName: name };
            }
        }

        function generateJueSpirit() {
            const allJue = [...jueA, ...jueB];
            const hasItemUp = state.spiritUp.item !== '' && random() < 0.5;
            let itemName;
            if (hasItemUp) {
                itemName = state.spiritUp.item;
            } else {
                itemName = pickRandom(allJue);
            }
            const isUpName = state.spiritUp.name !== '' && random() < 0.5;
            let exclusiveName;
            if (isUpName) {
                exclusiveName = state.spiritUp.name;
            } else {
                const groupNames = allNames.filter(n => state.spiritUp.group === 'A' ? groupA.has(n) : !groupA.has(n));
                exclusiveName = pickRandom(groupNames.length > 0 ? groupNames : allNames);
            }
            return { rarity: 'jue', name: itemName, displayName: itemName, exclusive: exclusiveName + '专属' };
        }

        function generateTianCard() {
            if (state.currentPool === 'custom') {
                const pity = state.tianPity;
                pity.tianCount++;
                let card;
                if (pity.tianCount >= 3) {
                    card = { rarity: 'tian', name: state.tianUp.tian, displayName: '???' };
                    pity.tianCount = 0;
                } else if (random() < 0.3) {
                    card = { rarity: 'tian', name: state.tianUp.tian, displayName: '???' };
                } else {
                    const name = pickRandom(tianCards.filter(n => n !== state.tianUp.tian));
                    card = { rarity: 'tian', name: name, displayName: '???' };
                }
                if (card.name === state.tianUp.tian) { pity.tianCount = 0; }
                return card;
            }
            const name = pickRandom(tianCards);
            return { rarity: 'tian', name: name, displayName: '???' };
        }

        function generateDiCard() {
            if (state.currentPool === 'custom') {
                if (random() < 0.3) return { rarity: 'di', name: state.tianUp.di, displayName: '???' };
                return { rarity: 'di', name: pickRandom(diCards), displayName: '???' };
            }
            if (state.currentPool === 'diCustom') {
                if (random() < 0.3) return { rarity: 'di', name: state.diUp.name, displayName: '???' };
                return { rarity: 'di', name: pickRandom(diCards), displayName: '???' };
            }
            return { rarity: 'di', name: pickRandom(diCards), displayName: '???' };
        }

        function performDraw(times, reuseCat) {
            if (state.currentPool === 'achievement') return;
            if (state.currentPool === 'spirit') {
                if (!state.spiritUp.name) { showToast('请先选择专属名士'); return; }
                const results = [];
                for (let i = 0; i < times; i++) results.push(drawSpirit());
                state.totalDraws['spirit'] += times;
                displayDirectResults(results, 'spirit');
                refreshUI();
                return;
            }
            if (state.currentPool === 'normal') {
                const rawCount = parseInt(normalDrawCountInput.value);
                if (isNaN(rawCount) || rawCount < 1 || rawCount > 10) { showToast('请输入1-10之间的数字'); return; }
                const count = Math.max(1, Math.min(10, rawCount));
                const results = [];
                for (let i = 0; i < count; i++) {
                    const card = drawNormal();
                    results.push(card);
                    addRecord('normal', card.displayName === '???' ? card.name : card.displayName);
                    updateNoTianStreak(card.rarity === 'tian');
                }
                state.totalDraws['normal'] += count;
                const triggered = checkAchievements(results, count === 10);
                displayDirectResults(results, 'normal', triggered);
                refreshUI();
                return;
            }
            if (state.currentPool === 'custom' && !state.tianUpHasBeenSet) { showToast('请先在天品自选中设定UP名士'); return; }
            if (state.currentPool === 'diCustom' && !state.diUpHasBeenSet) { showToast('请先在地品自选中设定UP名士'); return; }

            const results = [];
            const poolKey = state.currentPool === 'diCustom' ? 'diCustom' : (state.currentPool === 'custom' ? 'custom' : 'advanced');
            for (let i = 0; i < times; i++) {
                let card;
                if (state.currentPool === 'diCustom') { card = drawDiCustom(); }
                else { card = drawCustomOrAdvanced(); }
                results.push(card);
                addRecord(poolKey, card.displayName === '???' ? card.name : card.displayName);
                updateNoTianStreak(card.rarity === 'tian');
            }
            state.totalDraws[poolKey] += times;

            state.pendingDrawResults = results;
            state.pendingDrawCount = times;
            state.pendingPool = state.currentPool;
            const triggered = checkAchievements(results, times === 10);
            state.currentDrawAchievements = triggered;
            if (!reuseCat) {
                state.pendingCatName = catTypes[Math.floor(random() * catTypes.length)];
            }
            openCatOverlay(results, times, triggered, reuseCat);
        }

        function displayDirectResults(results, poolType, triggeredAchievements) {
            directResultArea.innerHTML = results.map((card, idx) => {
                let cls = 'result-item';
                if (poolType === 'spirit') {
                    cls += ' ' + card.rarity;
                    let html = '<span class="' + cls + '">' + card.displayName + '</span>';
                    if (card.rarity === 'jue' && card.exclusive) html += '<span class="exclusive-info">（查看专属）</span>';
                    return '<div style="display:flex;flex-direction:column;align-items:center;">' + html + '</div>';
                } else {
                    if (card.displayName === '???') {
                        if (card.rarity === 'tian') cls += ' tian-hidden';
                        else cls += ' di-hidden';
                        return '<span class="' + cls + '" data-idx="' + idx + '">???</span>';
                    } else if (card.rarity === 'xuan') { cls += ' xuan'; return '<span class="' + cls + '">' + card.name + '</span>'; }
                    else { cls += ' huang'; return '<span class="' + cls + '">' + card.name + '</span>'; }
                }
            }).join('');

            if (triggeredAchievements && triggeredAchievements.length > 0) {
                achievementNotification.textContent = '获得成就：' + triggeredAchievements.join('、');
                achievementNotification.style.display = 'block';
            } else {
                achievementNotification.style.display = 'none';
            }

            if (poolType === 'spirit') {
                directResultArea.querySelectorAll('.result-item.jue').forEach((el, idx2) => {
                    const jueCards = results.filter(c => c.rarity === 'jue');
                    const card = jueCards[idx2];
                    if (card && card.exclusive) {
                        el.addEventListener('click', () => {
                            playClickSound();
                            showToast(card.exclusive);
                        });
                        el.style.cursor = 'pointer';
                    }
                });
            } else {
                directResultArea.querySelectorAll('.result-item.tian-hidden, .result-item.di-hidden').forEach(el => {
                    el.addEventListener('click', function() {
                        playClickSound();
                        const i = parseInt(this.dataset.idx);
                        const card = results[i];
                        this.textContent = card.name;
                        this.classList.remove('tian-hidden', 'di-hidden');
                        this.classList.add(card.rarity === 'tian' ? 'tian' : 'di');
                        this.style.cursor = 'default';
                    });
                    el.style.cursor = 'pointer';
                });
            }
        }

        function openCatOverlay(results, count, triggeredAchievements, skipSoul) {
            catNameDisplay.textContent = state.pendingCatName;
            catMessage.textContent = '';
            catCardResults.innerHTML = '';
            catSoulBtn.style.display = skipSoul ? 'none' : 'inline-block';
            catExitBtn.style.display = 'inline-block';
            catAgainBtn.style.display = 'none';
            catAchievementNotification.style.display = 'none';
            catOverlay.style.display = 'flex';
            if (skipSoul) {
                showCatResults(results, count, triggeredAchievements);
            }
        }

        function showCatResults(results, count, triggeredAchievements) {
            const catName = state.pendingCatName;
            const pool = state.pendingPool;
            const hasTian = results.some(c => c.rarity === 'tian');
            let desc = '一只' + catName + '跳入九泉之井，';
            if (hasTian && (pool === 'custom' || pool === 'diCustom' || pool === 'advanced')) {
                desc += '周身散发着耀眼的黄光。';
            }
            const countText = count === 1 ? '一张' : (count + '张');
            desc += '片刻后跳出，带着' + countText + '卡片';
            catMessage.textContent = desc;

            catCardResults.innerHTML = results.map((card, idx) => {
                if (card.displayName !== '???') {
                    let cls = card.rarity === 'xuan' ? 'xuan-card' : 'huang-card';
                    return '<span class="card-item ' + cls + ' revealed">' + card.name + '</span>';
                } else {
                    let cls = card.rarity === 'tian' ? 'tian-card' : 'di-card';
                    return '<span class="card-item ' + cls + '" data-idx="' + idx + '">???</span>';
                }
            }).join('');

            catCardResults.querySelectorAll('.card-item:not(.revealed)').forEach(el => {
                el.addEventListener('click', function() {
                    playClickSound();
                    const i = parseInt(this.dataset.idx);
                    this.textContent = results[i].name;
                    this.classList.add('revealed');
                });
            });

            if (triggeredAchievements && triggeredAchievements.length > 0) {
                catAchievementNotification.textContent = '获得成就：' + triggeredAchievements.join('、');
                catAchievementNotification.style.display = 'block';
            } else {
                catAchievementNotification.style.display = 'none';
            }

            catSoulBtn.style.display = 'none';
            catAgainBtn.style.display = 'inline-block';
        }

        document.addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            if (btn.closest('.dropdown')) return;
            const isMajorAction = btn.id === 'singleDraw' || btn.id === 'tenDraw' || 
                                   btn.id === 'catSoulBtn' || btn.id === 'catAgainBtn' ||
                                   btn.id === 'confirmYesBtn' || btn.id === 'enterBtn';
            if (isMajorAction) {
                playConfirmSound();
            } else {
                playClickSound();
            }
        });

        catSoulBtn.addEventListener('click', () => {
            showCatResults(state.pendingDrawResults, state.pendingDrawCount, state.currentDrawAchievements);
            refreshUI();
        });

        catAgainBtn.addEventListener('click', () => {
            performDraw(state.pendingDrawCount, true);
        });

        catExitBtn.addEventListener('click', () => {
            catOverlay.style.display = 'none';
            refreshUI();
        });

        recordBtn.addEventListener('click', () => {
            const poolNames = { custom: '天品自选', diCustom: '地品自选', advanced: '高级卡池', normal: '普通卡池', spirit: '引灵' };
            recordTitle.textContent = poolNames[state.currentPool] + ' - 抽卡记录';
            const recs = state.records[state.currentPool] || [];
            recordList.innerHTML = recs.length === 0 ? '<div style="text-align:center;color:#888;">暂无记录</div>' :
                recs.map((r, i) => '<div class="record-row"><span>#' + (recs.length - i) + '</span><span>' + r + '</span></div>').join('');
            recordOverlay.style.display = 'flex';
        });

        recordCloseBtn.addEventListener('click', () => { recordOverlay.style.display = 'none'; });
        achievementCloseBtn.addEventListener('click', () => { achievementOverlay.style.display = 'none'; });

        function handleTianUpConfirm() {
            const tianVal = tianSearchInput.value.trim();
            const diVal = tianDiSearchInput.value.trim();
            if (!tianVal || !diVal) { showToast('请选择天卡和地卡UP名士'); return; }
            if (tianVal === '花木兰') {
                confirmText.textContent = '是否要选择花木兰作为天品名士up？';
                confirmOverlay.style.display = 'flex';
                pendingHuaMulanConfirm = 'tian';
                return;
            }
            if (!tianCards.includes(tianVal) || !diCards.includes(diVal)) { showToast('请输入正确的名士名称！'); return; }
            state.tianUp.tian = tianVal;
            state.tianUp.di = diVal;
            state.tianUp.poolName = tianPoolNames[tianVal] || '天品自选';
            state.tianUpHasBeenSet = true;
            refreshUI();
            showToast('UP名士设定成功：' + state.tianUp.poolName);
        }

        function handleDiUpConfirm() {
            const val = diUpSearchInput.value.trim();
            if (!val) { showToast('请输入地卡名士名称'); return; }
            if (!diCards.includes(val)) { showToast('请输入正确的名士名称！'); return; }
            state.diUp.name = val;
            state.diUp.poolName = diPoolNames[val] || '地品自选';
            state.diUpHasBeenSet = true;
            state.diCustomPity.diUpCount = 0;
            refreshUI();
            showToast('地品UP名士设定成功：' + state.diUp.poolName);
        }

        confirmTianUpBtn.addEventListener('click', handleTianUpConfirm);
        confirmDiUpBtn.addEventListener('click', handleDiUpConfirm);

        confirmYesBtn.addEventListener('click', () => {
            if (pendingHuaMulanConfirm === 'tian') {
                const diVal = tianDiSearchInput.value.trim();
                state.tianUp.tian = '花木兰';
                state.tianUp.di = diCards.includes(diVal) ? diVal : '地卡';
                state.tianUp.poolName = '巾帼将相';
                state.tianUpHasBeenSet = true;
                if (!state.earnedA[achievementHua.id]) {
                    state.earnedA[achievementHua.id] = true;
                    showToast('获得隐藏成就：木兰，行！');
                }
            }
            confirmOverlay.style.display = 'none';
            pendingHuaMulanConfirm = null;
            refreshUI();
        });

        confirmNoBtn.addEventListener('click', () => {
            confirmOverlay.style.display = 'none';
            pendingHuaMulanConfirm = null;
        });

        enterBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            mainApp.style.display = 'flex';
            refreshUI();
        });

        poolButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const pool = e.currentTarget.dataset.pool;
                state.currentPool = pool;
                directResultArea.innerHTML = '';
                achievementNotification.style.display = 'none';
                if (pool === 'achievement') {
                    achievementOverlay.style.display = 'flex';
                    renderAchievementPanel();
                }
                refreshUI();
            });
        });

        endPoolBtn.addEventListener('click', () => {
            if (state.currentPool === 'custom') {
                state.tianPity.tianCount = 0;
                state.tianUpHasBeenSet = false;
                state.tianUp.tian = '天卡';
                state.tianUp.di = '地卡';
                state.tianUp.poolName = '天品自选';
            } else if (state.currentPool === 'diCustom') {
                state.diCustomPity.diUpCount = 0;
                state.diUpHasBeenSet = false;
                state.diUp.name = '地卡';
                state.diUp.poolName = '地品自选';
            }
            refreshUI();
        });

        singleDrawBtn.addEventListener('click', () => performDraw(1, false));
        tenDrawBtn.addEventListener('click', () => {
            if (state.currentPool === 'normal') { performDraw(0, false); }
            else if (state.currentPool === 'spirit') { performDraw(10, false); }
            else { performDraw(10, false); }
        });

        refreshUI();
    })();
</script>
</body>
</html>
